[build]
  publish = "public"
  command = "git submodule update --init --recursive && hugo --gc --minify"

[build.environment]
  # 拉高 Node 版本，消除你看到的那個 16.x 警告
  NODE_VERSION = "20"
  # 對齊 CloudCannon 的 Hugo 版本
  HUGO_VERSION = "0.119.0"

[context.production.environment]
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"